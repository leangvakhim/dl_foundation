<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Learning: Activation Functions</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

    <style>
        /* Clean transitions for smooth step changes */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <!-- Main Container -->
    <div
        class="bg-white max-w-5xl w-full rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col md:h-[650px]">

        <!-- Header -->
        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white z-10">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                Activation Function Explorer
            </h1>
            <div class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full" id="step-indicator">
                Step 1 of 7
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

            <!-- Left Panel: Explanations & Equations -->
            <div
                class="w-full md:w-[45%] p-8 flex flex-col overflow-y-auto bg-white z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)] border-r border-slate-50">
                <div id="content-container" class="fade-enter-active">
                    <h2 id="step-title" class="text-3xl font-extrabold text-indigo-900 mb-4 tracking-tight">Title</h2>
                    <p id="step-text" class="text-slate-600 leading-relaxed text-lg mb-8">Description goes here.</p>

                    <!-- Equation Box (Dynamic) -->
                    <div id="equation-box" class="hidden bg-indigo-50/50 border border-indigo-100 rounded-xl p-6 mb-6">
                        <h3 class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">The Equation</h3>
                        <div id="step-equation" class="w-full text-slate-800">
                            <!-- Equation injected here -->
                        </div>
                    </div>
                </div>

                <!-- Dynamic Input Slider for Graphs -->
                <div id="slider-container" class="mt-auto hidden bg-slate-50 p-5 rounded-xl border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <label class="font-semibold text-slate-700 text-sm">Interactive Input (z)</label>
                        <span id="z-value-display"
                            class="font-mono bg-white border border-slate-200 px-2 py-1 rounded text-indigo-600 font-bold w-16 text-center">0.0</span>
                    </div>
                    <input type="range" id="z-slider" min="-5" max="5" step="0.1" value="0"
                        class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    <div class="flex justify-between text-xs text-slate-400 mt-2 font-mono">
                        <span>-5</span>
                        <span>0</span>
                        <span>+5</span>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Visualizations -->
            <div class="w-full md:w-[55%] bg-slate-50 flex items-center justify-center p-8 relative">

                <!-- Canvas for Graphs -->
                <canvas id="graph-canvas" width="500" height="500"
                    class="max-w-full bg-white rounded-xl shadow-sm border border-slate-200 hidden"></canvas>

                <!-- HTML Visuals for Intro/Equation steps -->
                <div id="html-visual"
                    class="w-full h-full flex flex-col items-center justify-center text-center hidden">
                    <!-- Injected via JS -->
                </div>

            </div>
        </div>

        <!-- Footer: Navigation -->
        <div class="px-8 py-5 border-t border-slate-100 bg-white flex justify-between items-center z-10">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                        clip-rule="evenodd" />
                </svg>
                Back
            </button>
            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm shadow-indigo-200 transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                Next Step
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </div>

    <script src="../js/activation_function.js"></script>
</body>

</html>
