<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Learning: Forward & Backward Propagation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        /* Smooth transitions for our neural network visualizer */
        .node {
            transition: all 0.5s ease;
        }

        .edge {
            transition: all 0.5s ease;
            stroke-width: 3;
            fill: none;
        }

        /* State Colors */
        .edge-inactive {
            stroke: #e2e8f0;
        }

        /* slate-200 */
        .edge-forward {
            stroke: #22c55e;
            stroke-dasharray: 8;
            animation: flow-forward 1s linear infinite;
        }

        /* green-500 */
        .edge-backward {
            stroke: #ef4444;
            stroke-dasharray: 8;
            animation: flow-backward 1s linear infinite;
        }

        /* red-500 */

        .node-inactive {
            fill: #ffffff;
            stroke: #94a3b8;
            stroke-width: 3;
        }

        .node-active-forward {
            fill: #dcfce7;
            stroke: #22c55e;
            stroke-width: 4;
        }

        .node-active-backward {
            fill: #fee2e2;
            stroke: #ef4444;
            stroke-width: 4;
        }

        .node-target {
            fill: #fef08a;
            stroke: #eab308;
            stroke-width: 4;
        }

        @keyframes flow-forward {
            from {
                stroke-dashoffset: 16;
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes flow-backward {
            from {
                stroke-dashoffset: 0;
            }

            to {
                stroke-dashoffset: 16;
            }
        }

        /* Math container styling */
        .math-block {
            font-size: 1.125rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            overflow-x: auto;
        }
    </style>
</head>

<body class="bg-white text-slate-800 font-sans min-h-screen flex flex-col p-4 md:p-8">

    <!-- Header -->
    <header class="mb-8 border-b border-slate-200 pb-4">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">Deep Learning Foundations</h1>
        <p class="text-slate-500 text-lg mt-2">An Interactive Guide to Forward & Backward Propagation</p>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-grow grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">

        <!-- Left Column: Neural Network SVG Visualization -->
        <div class="bg-slate-50 rounded-2xl p-6 border border-slate-200 flex justify-center items-center shadow-sm">
            <svg viewBox="0 0 600 400" class="w-full max-w-lg h-auto">
                <!-- Defs for arrowheads (optional, but good for direction) -->
                <defs>
                    <marker id="arrow-forward" viewBox="0 0 10 10" refX="25" refY="5" markerWidth="6" markerHeight="6"
                        orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" />
                    </marker>
                    <marker id="arrow-backward" viewBox="0 0 10 10" refX="-15" refY="5" markerWidth="6" markerHeight="6"
                        orient="auto">
                        <path d="M 10 0 L 0 5 L 10 10 z" fill="#ef4444" />
                    </marker>
                </defs>

                <!-- Edges: Input to Hidden -->
                <path id="e-i1-h1" class="edge edge-inactive" d="M 100 120 L 300 120" />
                <path id="e-i1-h2" class="edge edge-inactive" d="M 100 120 L 300 280" />
                <path id="e-i2-h1" class="edge edge-inactive" d="M 100 280 L 300 120" />
                <path id="e-i2-h2" class="edge edge-inactive" d="M 100 280 L 300 280" />

                <!-- Edges: Hidden to Output -->
                <path id="e-h1-o1" class="edge edge-inactive" d="M 300 120 L 500 200" />
                <path id="e-h2-o1" class="edge edge-inactive" d="M 300 280 L 500 200" />

                <!-- Nodes: Input Layer -->
                <circle id="n-i1" class="node node-inactive" cx="100" cy="120" r="25" />
                <text x="100" y="125" text-anchor="middle" font-weight="bold" class="text-slate-600">x₁</text>

                <circle id="n-i2" class="node node-inactive" cx="100" cy="280" r="25" />
                <text x="100" y="285" text-anchor="middle" font-weight="bold" class="text-slate-600">x₂</text>

                <!-- Nodes: Hidden Layer -->
                <circle id="n-h1" class="node node-inactive" cx="300" cy="120" r="25" />
                <text x="300" y="125" text-anchor="middle" font-weight="bold" class="text-slate-600">h₁</text>

                <circle id="n-h2" class="node node-inactive" cx="300" cy="280" r="25" />
                <text x="300" y="285" text-anchor="middle" font-weight="bold" class="text-slate-600">h₂</text>

                <!-- Node: Output Layer -->
                <circle id="n-o1" class="node node-inactive" cx="500" cy="200" r="25" />
                <text x="500" y="205" text-anchor="middle" font-weight="bold" class="text-slate-600">ŷ</text>

                <!-- Labels -->
                <text x="100" y="50" text-anchor="middle"
                    class="text-sm font-semibold fill-slate-400 uppercase tracking-widest">Input</text>
                <text x="300" y="50" text-anchor="middle"
                    class="text-sm font-semibold fill-slate-400 uppercase tracking-widest">Hidden</text>
                <text x="500" y="50" text-anchor="middle"
                    class="text-sm font-semibold fill-slate-400 uppercase tracking-widest">Output</text>
            </svg>
        </div>

        <!-- Right Column: Explanations & Math -->
        <div class="flex flex-col h-full justify-between">
            <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-md flex-grow">

                <!-- Step Badge -->
                <span id="step-badge"
                    class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-4 bg-blue-100 text-blue-700">
                    Step 1 of X
                </span>

                <!-- Title -->
                <h2 id="step-title" class="text-2xl font-bold text-slate-800 mb-4 transition-opacity duration-300">
                    Loading...
                </h2>

                <!-- Description -->
                <p id="step-description"
                    class="text-slate-600 text-lg leading-relaxed mb-6 transition-opacity duration-300">
                    Loading description...
                </p>

                <!-- Math Equation Area -->
                <div id="step-math" class="math-block bg-slate-50 p-4 rounded-xl border border-slate-200 hidden">
                    <!-- Equations will be injected here by KaTeX -->
                </div>

                <!-- Comprehensive Equations Summary Area (Hidden until last step) -->
                <div id="summary-math" class="hidden flex flex-col gap-4">
                    <div class="p-4 bg-green-50 border border-green-200 rounded-xl">
                        <h3 class="font-bold text-green-800 mb-2">1. Forward Propagation</h3>
                        <div id="math-fwd-sum" class="overflow-x-auto text-green-900"></div>
                    </div>
                    <div class="p-4 bg-red-50 border border-red-200 rounded-xl">
                        <h3 class="font-bold text-red-800 mb-2">2. Backward Propagation (Chain Rule)</h3>
                        <div id="math-bwd-sum" class="overflow-x-auto text-red-900"></div>
                    </div>
                    <div class="p-4 bg-blue-50 border border-blue-200 rounded-xl">
                        <h3 class="font-bold text-blue-800 mb-2">3. Weight Update (Gradient Descent)</h3>
                        <div id="math-upd-sum" class="overflow-x-auto text-blue-900"></div>
                    </div>
                </div>

            </div>

            <!-- Controls -->
            <div class="mt-6 flex items-center justify-between bg-slate-50 p-4 rounded-xl border border-slate-200">
                <button id="btn-prev" onclick="prevStep()"
                    class="px-6 py-2.5 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-slate-700 bg-white border border-slate-300 hover:bg-slate-100 active:bg-slate-200">
                    &larr; Previous
                </button>

                <!-- Progress Dots -->
                <div id="progress-dots" class="flex gap-2">
                    <!-- Dots injected by JS -->
                </div>

                <button id="btn-next" onclick="nextStep()"
                    class="px-6 py-2.5 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 shadow-sm">
                    Next &rarr;
                </button>
            </div>
        </div>

    </main>

    <script src="../js/forward_backward_propagation.js"></script>
</body>

</html>
